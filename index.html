<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Palavra Viva - WEB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#0d1117;
color:white;
padding-bottom:70px;
}

.container{max-width:420px;margin:auto;padding:8px;}

header{
background:#161b22;
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
}

header h1{color:#1db954;font-size:14px;}

.status-top{display:flex;align-items:center;gap:8px;}

#led1{
width:8px;height:8px;border-radius:50%;
background:#444;
}

.banner{
background:linear-gradient(135deg,#1db954,#000);
padding:10px;
border-radius:10px;
text-align:center;
}

.vu{
display:flex;
justify-content:center;
align-items:flex-end;
gap:2px;
height:45px;
margin-top:6px;
}

.bar{
width:3px;
display:flex;
flex-direction:column-reverse;
}

.seg{
width:100%;
height:3px;
background:#222;
}

.controls{margin-top:6px;font-size:11px;}

input[type=range]{width:100%;}

.page{display:none;}
.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:5px;
margin-top:8px;
}

.card{
background:#161b22;
padding:6px;
border-radius:8px;
font-size:12px;
}

.player{
position:fixed;
bottom:0;
width:100%;
background:#161b22;
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
font-size:12px;
}

button{
background:#1db954;
border:none;
padding:6px;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🌐 Rádio Palavra Viva</h1>
<div class="status-top">
<div id="led1"></div>
<div id="time"></div>
<div id="date"></div>
</div>
</header>

<div id="home" class="page active">

<div class="banner">

<h2 id="statusTopo">⚫ OFFLINE</h2>
<p id="musica">⚫ OFFLINE</p>
<p id="ouvintes">⚫ OFFLINE</p>

<div class="vu" id="vu"></div>

<div class="controls">
🔊 Volume
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
</div>

<button onclick="play()" id="btn">▶ PLAY</button>

</div>

<div class="card">📡 Rádio 24h Online</div>

<div class="grid">
<div class="card">🎤 Ao vivo</div>
<div class="card">🔥 Música</div>
<div class="card">📻 Stream ativo</div>
<div class="card">🔄 Atualize se travar</div>
</div>

</div>

<!-- AUDIO -->
<audio id="audio" crossorigin="anonymous" playsinline>
<source src="https://heights-blue-hub-remember.trycloudflare.com/stream" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const volume = document.getElementById("volume");

let ligado = false;
let vuInit = false;
let bars = [];

/* 🔓 DESBLOQUEIO SIMPLES (SEM AUDIOCONTEXT) */
function unlockAudio(){
audio.muted = false;
}

/* 🔊 VOLUME */
volume.oninput = () => audio.volume = volume.value;

/* ▶ PLAY */
async function play(){

try{

unlockAudio();

if(audio.paused){

await audio.play();

ligado = true;

btn.innerText = "⏸ PAUSE";
statusTopo.innerText = "🔴 AO VIVO";
musica.innerText = "🎵 Tocando ao vivo";
ouvintes.innerText = "👥 Online";

if(!vuInit){
initVU();
vuInit = true;
}

}else{

audio.pause();

ligado = false;

btn.innerText = "▶ PLAY";
statusTopo.innerText = "⚫ OFFLINE";
musica.innerText = "⚫ OFFLINE";
ouvintes.innerText = "⚫ OFFLINE";
}

}catch(e){
alert("Clique novamente para liberar o áudio");
}

}

/* 📊 VU (SEM AudioContext) */
const vu = document.getElementById("vu");

for(let i=0;i<25;i++){
let col = document.createElement("div");
col.className = "bar";

for(let j=0;j<10;j++){
let seg = document.createElement("div");
seg.className = "seg";
col.appendChild(seg);
}

vu.appendChild(col);
bars.push(col.children);
}

/* 🎛 VU SIMULADO (SEGURO) */
function initVU(){

animarVU();

}

function animarVU(){

requestAnimationFrame(animarVU);

let level = ligado ? Math.random()*10 : 0;

for(let i=0;i<bars.length;i++){

for(let j=0;j<bars[i].length;j++){

if(j < level){

if(j < 4) bars[i][j].style.background="#00ff00";
else if(j < 7) bars[i][j].style.background="#ffff00";
else bars[i][j].style.background="#ff0000";

}else{
bars[i][j].style.background="#222";
}

}

}

}

/* ⏰ RELÓGIO */
setInterval(()=>{
time.innerText = new Date().toLocaleTimeString();
date.innerText = new Date().toLocaleDateString();
},1000);

/* 🔴 LED */
setInterval(()=>{
led1.style.background = ligado ? "red" : "#444";
},200);

/* 🎵 STATUS */
setInterval(()=>{

if(!ligado){
musica.innerText = "⚫ OFFLINE";
ouvintes.innerText = "⚫ OFFLINE";
return;
}

musica.innerText = "🟢 Tocando ao vivo";
ouvintes.innerText = "🟡 " + (80 + Math.floor(Math.random()*300)) + " ouvintes";

},2000);

</script>

</body>
</html>
