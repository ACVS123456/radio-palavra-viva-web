<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Palavra Viva - WEB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:'Segoe UI';background:#0d1117;color:white;padding-bottom:80px;text-align:center;}

header{background:#161b22;display:flex;justify-content:space-between;align-items:center;padding:10px;flex-wrap:wrap;}
header h1{color:#1db954;font-size:16px;}

.status-top{display:flex;align-items:center;gap:10px;}

#led1{width:10px;height:10px;border-radius:50%;background:#444;transition:0.5s;}

.clock{text-align:center;}
.page{display:none;padding:15px;}
.active{display:block;}

.banner{background:linear-gradient(135deg,#1db954,#000);padding:25px;border-radius:10px;}
.card{background:#161b22;padding:10px;border-radius:10px;font-size:14px;}

.player{position:fixed;bottom:0;width:100%;background:#161b22;display:flex;align-items:center;gap:10px;padding:10px;}

button{background:#1db954;border:none;padding:8px;color:white;border-radius:5px;cursor:pointer;margin:5px;}

input{padding:8px;border-radius:5px;border:none;width:100%;margin-bottom:5px;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px;}

.volume-box{margin-top:10px;}
input[type="range"]{width:120px;}
.player input[type="range"]{width:90px;}

/* VU */
.vu{display:flex;justify-content:center;align-items:flex-end;gap:2px;margin-top:20px;height:140px;}
.bar{width:6px;height:10px;border-radius:3px;transform-origin:bottom;transition:0.05s;}
</style>
</head>

<body>

<header>
<h1>Rádio Palavra Viva-WEB</h1>

<div class="status-top">
<div id="led1"></div>

<div class="clock">
<div id="time"></div>
<div id="date"></div>
</div>
</div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="banner">
<h2 id="statusTopo">⚫ OFFLINE</h2>
<p id="musica">⚫ OFFLINE</p>
<p id="ouvintes">⚫ OFFLINE</p>
</div>

<div class="grid">
<div class="card">📻 24h no ar</div>
<div class="card">🎤 Programas ao vivo</div>
<div class="card">🔥 Hits atualizados</div>
<div class="card">▶️ Aguarde 10s após clicar</div>
<div class="card">🔄 Atualize se parar</div>
</div>
</div>

<!-- MENU -->
<div>
<button onclick="mostrar('home')">🏠 Home</button>
<button onclick="mostrar('pedido')">🎵 Pedir Música</button>
<button onclick="abrirAdmin()">🔒 Admin</button>
</div>

<!-- PEDIDO -->
<div id="pedido" class="page">
<h3>🎵 Pedido</h3>

<input id="nome" placeholder="Seu nome">
<input id="musicaInput" placeholder="Música">
<input id="cantor" placeholder="Cantor">

<button onclick="enviarPedido()">Enviar Pedido</button>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">
<h3>📋 Pedidos Recebidos</h3>
<div id="lista"></div>
</div>

<!-- PLAYER -->
<div class="player">
<button onclick="play()" id="btn"><i class="fas fa-play"></i></button>
<input type="range" min="0" max="1" step="0.01" onchange="audio.volume=this.value">
<span id="statusPlayer">OFFLINE</span>
</div>

<!-- AUDIO -->
<audio id="audio"></audio>

<button onclick="toggleMute()">🔇 Mudo</button>

<div class="volume-box">
🔊 Volume
<input type="range" min="0" max="1" step="0.01" value="1" id="volume">
</div>

<div class="volume-box">
🎚️ Sensibilidade
<input type="range" min="1" max="5" step="0.1" value="2" id="gainControl">
</div>

<div class="vu" id="vu"></div>

<script>
// ===== AUDIO =====
const audio = document.getElementById("audio");

const streams = [
"https://heights-blue-hub-remember.trycloudflare.com/stream",
"https://stream.zeno.fm/0r0xa792kwzuv"
];

let atual = 0;

function carregarStream(){
audio.src = streams[atual];
audio.load();
}

audio.onerror = ()=>{
atual++;
if(atual < streams.length){
carregarStream();
audio.play();
}else{
alert("Stream indisponível");
}
};

// ===== ELEMENTOS =====
const btn = document.getElementById("btn");
const volumeSlider = document.getElementById("volume");
const gainSlider = document.getElementById("gainControl");

let ligado=false;

// ===== AUDIO CONTEXT =====
let ctx, analyser, dataArray, source, gainNode;
let iniciado=false;

function initAudio(){
if(iniciado) return;

ctx = new (window.AudioContext||window.webkitAudioContext)();

analyser = ctx.createAnalyser();
analyser.fftSize = 512;

gainNode = ctx.createGain();
gainNode.gain.value = gainSlider.value;

source = ctx.createMediaElementSource(audio);

source.connect(gainNode);
gainNode.connect(analyser);
analyser.connect(ctx.destination);

dataArray = new Uint8Array(analyser.frequencyBinCount);

iniciado=true;
}

// ===== PLAYER =====
function play(){

if(!audio.src) carregarStream();

if(!iniciado) initAudio();

if(ctx.state==="suspended") ctx.resume();

if(audio.paused){

audio.play().then(()=>{
btn.innerHTML='<i class="fas fa-pause"></i>';
ligado=true;

statusPlayer.innerText="🔴 AO VIVO";
statusTopo.innerText="🔴 AO VIVO";

animateVU();

}).catch(()=>{
alert("Clique novamente");
});

}else{

audio.pause();
btn.innerHTML='<i class="fas fa-play"></i>';
ligado=false;

statusPlayer.innerText="⚫ OFFLINE";
statusTopo.innerText="⚫ OFFLINE";
}
}

// ===== CONTROLES =====
function toggleMute(){audio.muted=!audio.muted;}
volumeSlider.oninput=()=>audio.volume=volumeSlider.value;

gainSlider.oninput=()=>{
if(gainNode) gainNode.gain.value=gainSlider.value;
};

// ===== TELAS =====
function mostrar(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// ===== PEDIDOS =====
function enviarPedido(){
let nomeVal = document.getElementById("nome").value.trim();
let musicaVal = document.getElementById("musicaInput").value.trim();
let cantorVal = document.getElementById("cantor").value.trim();

if(!nomeVal||!musicaVal||!cantorVal) return alert("Preencha tudo!");

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];

pedidos.push({nome:nomeVal,musica:musicaVal,cantor:cantorVal,data:new Date().toLocaleString()});
localStorage.setItem("pedidos",JSON.stringify(pedidos));

alert("Pedido enviado!");

document.getElementById("nome").value="";
document.getElementById("musicaInput").value="";
document.getElementById("cantor").value="";
}

// ===== ADMIN =====
function abrirAdmin(){
let senha=prompt("Digite a senha:");
if(senha!=="928374") return alert("Senha errada!");

document.getElementById("admin").style.display="block";
carregarPedidos();
}

function carregarPedidos(){
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
let lista=document.getElementById("lista");

lista.innerHTML="";

if(pedidos.length===0){
lista.innerHTML="Nenhum pedido ainda";
return;
}

pedidos.forEach((p,i)=>{
lista.innerHTML+=`
<div>
<b>${p.nome}</b><br>
🎵 ${p.musica}<br>
🎤 ${p.cantor}<br>
🕒 ${p.data}<br>
<button onclick="apagar(${i})">Excluir</button>
</div>`;
});
}

function apagar(i){
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
pedidos.splice(i,1);
localStorage.setItem("pedidos",JSON.stringify(pedidos));
carregarPedidos();
}

// ===== RELÓGIO =====
setInterval(()=>{
time.innerText=new Date().toLocaleTimeString();
date.innerText=new Date().toLocaleDateString();
},1000);

// ===== LED =====
setInterval(()=>{
if(!ligado){led1.style.background="#444";return;}
led1.style.background=led1.style.background=="lime"?"#444":"lime";
},1000);

// ===== SIMULAÇÃO =====
setInterval(()=>{
if(!ligado) return;
musica.innerText="🟢 Tocando: Música "+Math.floor(Math.random()*100);
},4000);

setInterval(()=>{
if(!ligado) return;
ouvintes.innerText=Math.floor(Math.random()*200)+" 🟡 Ouvintes";
},3000);

// ===== VU =====
const vu=document.getElementById("vu");
const bars=[];

for(let i=0;i<50;i++){
let b=document.createElement("div");
b.classList.add("bar");
vu.appendChild(b);
bars.push(b);
}

let smooth=new Array(50).fill(0);

function animateVU(){
requestAnimationFrame(animateVU);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

for(let i=0;i<bars.length;i++){
let v=Math.pow((dataArray[i]||0)/255,1.5)*180;
smooth[i]=smooth[i]*0.6+v*0.4;

let h=Math.min(smooth[i],140);
bars[i].style.height=h+"px";

if(h<50) bars[i].style.background="#00ff00";
else if(h<90) bars[i].style.background="#ffff00";
else bars[i].style.background="#ff0000";

bars[i].style.boxShadow="0 0 8px "+bars[i].style.background;
}
}
</script>

</body>
</html>
