<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Rádio Palavra Viva - WEB</title>

<style>
    /* BANNER */
.banner{
    background:linear-gradient(135deg,#1db954,#000);
    padding:25px;
    border-radius:10px;
    text-align:center;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-top:10px;
}

.card{
    background:#161b22;
    padding:10px;
    border-radius:10px;
    font-size:14px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#161b22;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    z-index:999;
    justify-content:flex-start;
}

/* 🔥 BARRA CORRIGIDA */
.player input[type="range"]{
    width:100px;
    max-width:100px;
    flex:0;
    height:4px;
    cursor:pointer;
}

/* FORM */
button{
    background:#1db954;
    border:none;
    padding:8px;
    color:white;
    border-radius:5px;
    cursor:pointer;
    
}
    .form-box{
  max-width:300px;
  margin:20px auto;
}

.form-box input{
  width:100%;
  padding:6px;
  font-size:14px;
}

.form-box button{
  width:100%;
  padding:6px;
  font-size:14px;
}
    
body{margin:0;font-family:'Segoe UI';background:#0d1117;color:white;padding-bottom:80px;}

header{background:#161b22;display:flex;justify-content:space-between;align-items:center;padding:10px;flex-wrap:wrap;}

header h1{color:#1db954;font-size:16px;}

.status-top{display:flex;align-items:center;gap:10px;}

#led1,#led2{width:10px;height:10px;border-radius:50%;background:#444;}

.clock{text-align:center;}
.clock .title{font-size:10px;color:#38bdf8;}
.clock .time{font-size:14px;font-weight:bold;}
.clock .date{font-size:10px;color:#94a3b8;}

.page{display:none;padding:15px;}
.active{display:block;}

.banner{
background:linear-gradient(135deg,#1db954,#000);
padding:25px;border-radius:10px;text-align:center;
}

.card{background:#161b22;padding:10px;border-radius:10px;font-size:14px;}

.player{
position:fixed;bottom:0;width:100%;
background:#161b22;display:flex;align-items:center;gap:10px;padding:10px;
}

button{
background:#1db954;border:none;padding:8px;color:white;border-radius:5px;cursor:pointer;
}

input{
padding:8px;border-radius:5px;border:none;width:100%;margin-bottom:5px;
}

.pedido{background:#334155;padding:10px;margin-top:10px;border-radius:8px;}

.menu{display:flex;gap:10px;padding:10px;justify-content:center;}

.menu button{background:#0ea5e9;}

.admin{display:none;}
</style>

<!-- FIREBASE V8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

apiKey:"COLE_AQUI",

admin.style.display="block";

</script>

</head>

<body>

<header>
<h1>Rádio Palavra Viva-WEB</h1>

<div class="status-top">
<div id="led1"></div>


<div class="clock">
<div id="time">00:00:00</div>
<div id="date">--/--/----</div>
</div>
</div>
</header>



<!-- HOME -->
<div id="home" class="page active">
<div class="banner">
<h2 id="statusTopo">⚫ OFFLINE</h2>
<p id="musica">⚫ OFFLINE</p>
<p id="ouvintes">⚫ OFFLINE</p>
</div>
</div>

<div class="grid">
<div class="card">📻 24h no ar</div>
<div class="card">🎤 Programas ao vivo</div>
<div class="card">🔥 Hits atualizados</div>
<div class="card">▶️ Aguarde 10s após clicar</div>
<div class="card">🔄 Atualize se parar</div>
</div>

<body>

<header>
<h2>📻 Rádio Palavra Viva</h2>
</header>

<div class="banner">
<h3 id="ouvintes">👥 Ouvindo agora: 1</h3>
</div>

    

<!-- PEDIDO -->

<div style="text-align:center;">
<button onclick="mostrar('pedido')">🎵 Pedir Música</button>
<button onclick="abrirAdmin()">🔒 Admin</button>
</div>

<!-- PEDIDO -->
<div id="pedido" class="page active">
<h3 style="text-align:center;">🎵 Pedido</h3>

<div class="form-box">
<input id="nome" placeholder="Seu nome">
<input id="musica" placeholder="Música">
<input id="cantor" placeholder="Cantor">

<button onclick="enviarPedido()">Enviar Pedido</button>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="admin">
<h3>📋 Pedidos Recebidos</h3>
<div id="lista"></div>
</div>

<!-- PLAYER -->
<div class="player">
<button onclick="play()" id="btn"><i class="fas fa-play"></i></button>
<span id="statusPlayer">OFFLINE</span>
</div>

<audio id="audio" src="https://cumulative-houston-transform-ranging.trycloudflare.com/stream"></audio>

<script>

// ===== TROCA DE TELA =====
function mostrar(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// ===== SALVAR PEDIDO LOCAL =====
function enviarPedido(){

let nome = document.getElementById("nome").value;
let musica = document.getElementById("musica").value;
let cantor = document.getElementById("cantor").value;

if(!nome || !musica || !cantor){
alert("Preencha tudo!");
return;
}

// pega lista atual
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

// adiciona novo
pedidos.push({
  nome,
  musica,
  cantor,
  data: new Date().toLocaleString()
});

// salva
localStorage.setItem("pedidos", JSON.stringify(pedidos));

alert("Pedido enviado!");

// limpa campos
document.getElementById("nome").value="";
document.getElementById("musica").value="";
document.getElementById("cantor").value="";
}

// ===== ADMIN =====
function abrirAdmin(){

let senha = prompt("Digite a senha:");

if(senha !==  "928374"){
alert("Senha errada!");
return;
}

document.getElementById("admin").style.display="block";

// pega pedidos
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

let lista = document.getElementById("lista");
lista.innerHTML="";

if(pedidos.length === 0){
lista.innerHTML="Nenhum pedido ainda";
return;
}
pedidos.forEach((p, i)=>{
lista.innerHTML += `
<div style="margin-bottom:10px;border-bottom:1px solid #333;padding-bottom:5px;">
<b>${p.nome}</b><br>
🎵 ${p.musica}<br>
🎤 ${p.cantor}<br>
🕒 ${p.data}<br>
<button onclick="apagar(${i})">Excluir</button>
</div>
`;
});
}
    
// ===== APAGAR =====
function apagar(index){

let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

pedidos.splice(index,1);

localStorage.setItem("pedidos", JSON.stringify(pedidos));

abrirAdmin(); // atualiza lista
}
    
// UI
function mostrar(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// PLAYER
const audio=document.getElementById("audio");
const btn=document.getElementById("btn");

const led1=document.getElementById("led1");
const led2=document.getElementById("led2");

const statusPlayer=document.getElementById("statusPlayer");
const statusTopo=document.getElementById("statusTopo");
const musica=document.getElementById("musica");
const ouvintes=document.getElementById("ouvintes");

let ligado=false;

function play(){
if(audio.paused){
audio.play();
btn.innerHTML='<i class="fas fa-pause"></i>';
ligado=true;

statusPlayer.innerText="🔴 AO VIVO";
statusTopo.innerText="🔴 AO VIVO";

led1.style.background="lime";
led2.style.background="yellow";
}else{
audio.pause();
btn.innerHTML='<i class="fas fa-play"></i>';
ligado=false;

statusPlayer.innerText="⚫ OFFLINE";
statusTopo.innerText="⚫ OFFLINE";

led1.style.background="#444";
led2.style.background="#444";
}
}

// RELÓGIO
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleTimeString();
document.getElementById("date").innerText=new Date().toLocaleDateString();
},1000);

// SIMULAÇÕES
setInterval(()=>{
if(!ligado) return;
musica.innerText="🟢 Tocando: Música "+Math.floor(Math.random()*100);
},4000);

setInterval(()=>{
if(!ligado) return;
ouvintes.innerText=Math.floor(Math.random()*200)+"🟡  Ouvintes";
},3000);

</script>

</body>
</html>
