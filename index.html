<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Palavra Viva - WEB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:'Segoe UI';background:#0d1117;color:white;padding-bottom:80px;text-align:center;}

header{background:#161b22;display:flex;justify-content:space-between;align-items:center;padding:10px;flex-wrap:wrap;}
header h1{color:#1db954;font-size:16px;}

.status-top{display:flex;align-items:center;gap:10px;}

#led1{
width:10px;height:10px;border-radius:50%;
background:#444;transition:0.5s;
}

.clock{text-align:center;}
.page{display:none;padding:15px;}
.active{display:block;}

.banner{background:linear-gradient(135deg,#1db954,#000);padding:25px;border-radius:10px;text-align:center;}
.card{background:#161b22;padding:10px;border-radius:10px;font-size:14px;}

.player{position:fixed;bottom:0;width:100%;background:#161b22;display:flex;align-items:center;gap:10px;padding:10px;}

button{background:#1db954;border:none;padding:8px;color:white;border-radius:5px;cursor:pointer;margin:5px;}

input{padding:8px;border-radius:5px;border:none;width:100%;margin-bottom:5px;}

.volume-box{margin-top:10px;}
input[type="range"]{width:80%;}

/* VU */
.vu{
display:flex;justify-content:center;align-items:flex-end;
gap:2px;margin-top:20px;height:140px;
}
.bar{
width:6px;height:10px;border-radius:3px;
transform-origin:bottom;transition:0.05s;
}
</style>
</head>

<body>

<header>
<h1>Rádio Palavra Viva-WEB</h1>

<div class="status-top">
<div id="led1"></div>

<div class="clock">
<div id="time"></div>
<div id="date"></div>
</div>
</div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="banner">
<h2 id="statusTopo">⚫ OFFLINE</h2>
<p id="musica">⚫ OFFLINE</p>
<p id="ouvintes">⚫ OFFLINE</p>
</div>
</div>

<!-- MENU -->
<div>
<button onclick="mostrar('home')">🏠 Home</button>
<button onclick="mostrar('pedido')">🎵 Pedir Música</button>
</div>

<!-- PEDIDO -->
<div id="pedido" class="page">
<h3>🎵 Pedido</h3>

<input id="nome" placeholder="Seu nome">
<input id="musicaInput" placeholder="Música">
<input id="cantor" placeholder="Cantor">

<button onclick="enviarPedido()">Enviar</button>
</div>

<!-- PLAYER -->
<div class="player">
<button onclick="play()" id="btn"><i class="fas fa-play"></i></button>
<span id="statusPlayer">OFFLINE</span>
</div>

<!-- AUDIO -->
<audio id="audio" crossorigin="anonymous"
src="https://heights-blue-hub-remember.trycloudflare.com/stream"></audio>

<div class="volume-box">
🔊 Volume
<input type="range" min="0" max="1" step="0.01" value="1" id="volume">
</div>

<div class="volume-box">
🎚️ Sensibilidade
<input type="range" min="1" max="5" step="0.1" value="2" id="gainControl">
</div>

<div class="vu" id="vu"></div>

<script>
// ===== ELEMENTOS =====
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const volume = document.getElementById("volume");
const gainSlider = document.getElementById("gainControl");

let ligado=false;

// ===== PLAY =====
function play(){

if(!ctx){ initAudio(); }

if(audio.paused){
audio.play();
animateVU();
btn.innerHTML='<i class="fas fa-pause"></i>';
ligado=true;
statusPlayer.innerText="🔴 AO VIVO";
statusTopo.innerText="🔴 AO VIVO";
}else{
audio.pause();
btn.innerHTML='<i class="fas fa-play"></i>';
ligado=false;
statusPlayer.innerText="⚫ OFFLINE";
statusTopo.innerText="⚫ OFFLINE";
}
}

// ===== VOLUME =====
volume.oninput=()=>audio.volume=volume.value;

// ===== PEDIDOS =====
function enviarPedido(){
let nome=nome.value, musica=musicaInput.value, cantor=cantor.value;
if(!nome||!musica||!cantor)return alert("Preencha tudo");

let p=JSON.parse(localStorage.getItem("pedidos"))||[];
p.push({nome,musica,cantor,data:new Date().toLocaleString()});
localStorage.setItem("pedidos",JSON.stringify(p));

alert("Enviado!");
nome.value=musicaInput.value=cantor.value="";
}

// ===== RELÓGIO =====
setInterval(()=>{
time.innerText=new Date().toLocaleTimeString();
date.innerText=new Date().toLocaleDateString();
},1000);

// ===== LED =====
setInterval(()=>{
if(!ligado){
led1.style.background="#444";return;
}
led1.style.background = led1.style.background=="lime"?"#444":"lime";
},1000);

// ===== VU =====
const vu=document.getElementById("vu");
const bars=[];

for(let i=0;i<50;i++){
let b=document.createElement("div");
b.classList.add("bar");
vu.appendChild(b);
bars.push(b);
}

let ctx, analyser, dataArray, gainNode;
let smooth=new Array(50).fill(0);

function initAudio(){
ctx=new (window.AudioContext||window.webkitAudioContext)();
analyser=ctx.createAnalyser();
analyser.fftSize=512;

gainNode=ctx.createGain();
gainNode.gain.value=gainSlider.value;

let src=ctx.createMediaElementSource(audio);
src.connect(gainNode);
gainNode.connect(analyser);
analyser.connect(ctx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

gainSlider.oninput=()=>{
if(gainNode) gainNode.gain.value=gainSlider.value;
};

function animateVU(){
requestAnimationFrame(animateVU);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

for(let i=0;i<bars.length;i++){
let v=Math.pow((dataArray[i]||0)/255,1.5)*180;
smooth[i]=smooth[i]*0.6+v*0.4;

let h=Math.min(smooth[i],140);
bars[i].style.height=h+"px";

// CORES
if(h<50) bars[i].style.background="#00ff00";
else if(h<90) bars[i].style.background="#ffff00";
else bars[i].style.background="#ff0000";

bars[i].style.boxShadow="0 0 8px "+bars[i].style.background;
}
}
</script>

</body>
</html>
