<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Palavra Viva - WEB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(180deg,#0d1117,#020202);
color:white;
padding-bottom:80px;
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

header{
background:#161b22;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px #000;
}

header h1{
color:#1db954;
font-size:15px;
}

.status-top{
display:flex;
align-items:center;
gap:8px;
font-size:11px;
}

#led1{
width:8px;
height:8px;
border-radius:50%;
background:#444;
}

.banner{
background:linear-gradient(135deg,#1db954,#000);
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.controls{
margin-top:10px;
font-size:12px;
}

input[type=range]{
width:100%;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:10px;
}

.card{
background:#161b22;
padding:10px;
border-radius:10px;
font-size:12px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#1f2937;
}

.card:first-child{
text-align:center;
font-weight:bold;
background:#1db954;
color:#000;
}

button{
background:#1db954;
border:none;
padding:8px 10px;
color:white;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

.player{
position:fixed;
bottom:0;
width:100%;
background:#0d1117;
border-top:1px solid #222;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
}

.player-controls{
display:flex;
gap:12px;
align-items:center;
}

.home-btn{
background:#222;
padding:10px;
border-radius:50%;
}

.play-btn{
background:#1db954;
padding:12px;
border-radius:50%;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border:none;
border-radius:6px;
}

.page{display:none;}
.active{display:block;}

#lista div{
background:#111;
padding:6px;
margin:4px 0;
border-radius:5px;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🌐 Rádio Palavra Viva</h1>
<div class="status-top">
<div id="led1"></div>
<div id="time"></div>
<div id="date"></div>
</div>
</header>

<div id="home" class="page active">

<div class="banner">
<h2 id="statusTopo">⚫ OFFLINE</h2>
<p id="musica">⚫ OFFLINE</p>
<p id="ouvintes">⚫ OFFLINE</p>

<div class="controls">
🔊 Volume
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
</div>
</div>

<div class="card">📡 Transmissão 24h ativa</div>

<div class="grid">
<div class="card">⚠️ Programação Gospel as 00:00:00r</div>
<div class="card">📻 24h no ar</div>
<div class="card">🎤 Programas ao vivo</div>
<div class="card">🔥 Hits atualizados</div>
<div class="card">▶️ Aguarde 10s após clicar</div>
<div class="card">🔄 Atualize se parar</div>
</div>

<div style="text-align:center;margin-top:10px;">
<button onclick="mostrar('pedido')">🎵 Pedir Música</button>
<button onclick="abrirAdmin()">🔒 Admin</button>
</div>

</div>

<div id="pedido" class="page">
<h3>🎵 Pedido</h3>
<input id="nome" placeholder="Seu nome">
<input id="musicaInput" placeholder="Música">
<input id="cantor" placeholder="Cantor">
<button onclick="enviarPedido()">Enviar</button>
<button onclick="mostrar('home')">⬅ Voltar</button>
</div>

<div id="admin" class="page">
<h3>📋 Pedidos</h3>
<div id="lista"></div>
<button onclick="mostrar('home')">⬅ Voltar</button>
</div>

</div>

<div class="player">
<div class="player-controls">

<button class="home-btn" onclick="mostrar('home')">
<i class="fas fa-home"></i>
</button>

<button class="play-btn" onclick="play()" id="btn">
<i class="fas fa-play"></i>
</button>

</div>

<span id="statusPlayer">OFFLINE</span>
</div>

<audio id="audio">
<source src="https://paineldj5.com.br:20520/stream"type="audio/mpeg">
</audio>

<script>

// ELEMENTOS (CORRIGIDO)
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const volumeSlider = document.getElementById("volume");

const time = document.getElementById("time");
const date = document.getElementById("date");
const led1 = document.getElementById("led1");
const statusPlayer = document.getElementById("statusPlayer");
const statusTopo = document.getElementById("statusTopo");
const musica = document.getElementById("musica");
const ouvintes = document.getElementById("ouvintes");

let ligado=false;

/* NAV */
function mostrar(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* PEDIDO */
function enviarPedido(){
let n=nome.value.trim();
let m=musicaInput.value.trim();
let c=cantor.value.trim();

if(!n||!m||!c) return alert("Preencha tudo");

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
pedidos.push({n,m,c});
localStorage.setItem("pedidos",JSON.stringify(pedidos));

alert("Enviado!");
}

/* ADMIN */
function abrirAdmin(){
let senha=prompt("Senha:");
if(senha!=="928374") return alert("Errada");
mostrar('admin');
carregarPedidos();
}

function carregarPedidos(){
let lista=document.getElementById("lista");
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
lista.innerHTML="";
pedidos.forEach(p=>{
lista.innerHTML+=`<div>${p.n} - ${p.m}</div>`;
});
}

/* VOLUME */
volumeSlider.oninput=()=> audio.volume=volumeSlider.value;

/* PLAY */
function play(){
if(audio.paused){
audio.play().catch(()=>alert("Clique novamente"));
btn.innerHTML='<i class="fas fa-pause"></i>';
ligado=true;

statusPlayer.innerText="🔴 AO VIVO";
statusTopo.innerText="🔴 AO VIVO";

}else{
audio.pause();
btn.innerHTML='<i class="fas fa-play"></i>';
ligado=false;

statusPlayer.innerText="⚫ OFFLINE";
statusTopo.innerText="⚫ OFFLINE";
}
}

/* RELÓGIO */
setInterval(()=>{
time.innerText=new Date().toLocaleTimeString();
date.innerText=new Date().toLocaleDateString();
},1000);

/* LED */
setInterval(()=>{
if(!ligado){led1.style.background="#444";return;}
led1.style.background=Math.random()>0.5?"red":"#300";
},200);

/* INFO FAKE */
setInterval(()=>{
if(!ligado) return;
musica.innerText="🟢 Tocando agora...";
ouvintes.innerText="🟡 Ouvintes online...";
},3000);

</script>

</body>
</html>
