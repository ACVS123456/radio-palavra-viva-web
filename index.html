<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Palavra Viva - WEB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#0d1117;
color:white;
padding-bottom:70px;
}

.container{
max-width:420px;
margin:auto;
padding:8px;
}

header{
background:#161b22;
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
}

header h1{
color:#1db954;
font-size:14px;
}

.status-top{
display:flex;
align-items:center;
gap:8px;
}

#led1{
width:8px;
height:8px;
border-radius:50%;
background:#444;
}

.banner{
background:linear-gradient(135deg,#1db954,#000);
padding:10px;
border-radius:10px;
text-align:center;
}

.vu{
display:flex;
justify-content:center;
align-items:flex-end;
gap:2px;
height:45px;
margin-top:6px;
}

.bar{
width:3px;
display:flex;
flex-direction:column-reverse;
gap:1px;
}

.seg{
width:100%;
height:3px;
background:#222;
border-radius:2px;
}

.controls{
margin-top:6px;
font-size:11px;
}

input[type=range]{
height:3px;
width:100%;
}

.page{display:none;}
.active{display:block;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:5px;
margin-top:8px;
}

.card{
background:#161b22;
padding:6px;
border-radius:8px;
font-size:12px;
}

.player{
position:fixed;
bottom:0;
width:100%;
background:#161b22;
display:flex;
align-items:center;
justify-content:space-between;
padding:8px;
font-size:12px;
}

.player-controls{
display:flex;
gap:5px;
align-items:center;
}

button{
background:#1db954;
border:none;
padding:6px;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🌐 Rádio Palavra Viva</h1>

<div class="status-top">
<div id="led1"></div>

<div>
<div id="time"></div>
<div id="date"></div>
</div>
</div>
</header>

<!-- HOME -->
<div id="home" class="page active">

<div class="banner">

<h2 id="statusTopo">⚫ OFFLINE</h2>
<p id="musica">⚫ OFFLINE</p>
<p id="ouvintes">⚫ OFFLINE</p>

<div class="vu" id="vu"></div>

<div class="controls">
🔊 Volume / Sensibilidade
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
</div>

</div>
<div class="card">📡 Transmissão 24h ativa</div>

</div>

<div class="grid">
<div class="card">📻 24h no ar</div>
<div class="card">🎤 Programas ao vivo</div>
<div class="card">🔥 Hits atualizados</div>
<div class="card">▶️ Aguarde 10s após clicar</div>
<div class="card">🔄 Atualize se parar</div>
</div>


<div style="text-align:center;margin-top:10px;">
<button onclick="mostrar('pedido')">🎵 Pedido</button>
<button onclick="abrirAdmin()">🔒 Admin</button>
</div>

</div>

<!-- PEDIDO -->
<div id="pedido" class="page">
<h3>🎵 Pedido</h3>

<input id="nome" placeholder="Seu nome">
<input id="musicaInput" placeholder="Música">
<input id="cantor" placeholder="Cantor">

<button onclick="enviarPedido()">Enviar</button>
<button onclick="mostrar('home')">⬅ Voltar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h3>📋 Pedidos</h3>
<div id="lista"></div>

<button onclick="mostrar('home')">⬅ Voltar</button>
</div>

</div>

<!-- PLAYER -->
<div class="player">

<div class="player-controls">
<button onclick="mostrar('home')"><i class="fas fa-home"></i></button>

<button onclick="play()" id="btn">
<i class="fas fa-play"></i>
</button>
</div>

<span id="statusPlayer">OFFLINE</span>

</div>

<audio id="audio" src="https://heights-blue-hub-remember.trycloudflare.com/stream"></audio>

<script>

const audio=document.getElementById("audio");
const btn=document.getElementById("btn");
const volumeSlider=document.getElementById("volume");

let ctx, analyser, source, dataArray;
let bars=[];
let ligado=false;

/* NAVEGAÇÃO */
function mostrar(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* PEDIDOS */
function enviarPedido(){
let nome=document.getElementById("nome").value.trim();
let musica=document.getElementById("musicaInput").value.trim();
let cantor=document.getElementById("cantor").value.trim();

if(!nome||!musica||!cantor) return alert("Preencha tudo");

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
pedidos.push({nome,musica,cantor});
localStorage.setItem("pedidos",JSON.stringify(pedidos));

alert("Enviado!");
}

/* ADMIN */
function abrirAdmin(){
let senha=prompt("Senha:");
if(senha!=="928374"){alert("Errada");return;}
mostrar('admin');
carregarPedidos();
}

function carregarPedidos(){
let lista=document.getElementById("lista");
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];
lista.innerHTML="";

pedidos.forEach(p=>{
lista.innerHTML+=`<div>${p.nome} - ${p.musica}</div>`;
});
}

/* VOLUME */
volumeSlider.oninput=()=>{
audio.volume=volumeSlider.value;
};

/* PLAY */
function play(){

if(!ctx) initVU();
if(ctx.state==="suspended") ctx.resume();

if(audio.paused){

audio.play().catch(()=>alert("Clique novamente"));

btn.innerHTML='<i class="fas fa-pause"></i>';
ligado=true;

statusPlayer.innerText="🔴 AO VIVO";
statusTopo.innerHTML="🔴 AO VIVO";

animateVU();

}else{

audio.pause();

btn.innerHTML='<i class="fas fa-play"></i>';
ligado=false;

statusPlayer.innerText="⚫ OFFLINE";
statusTopo.innerHTML="⚫ OFFLINE";
}
}

/* VU */
const vu=document.getElementById("vu");

for(let i=0;i<30;i++){
let col=document.createElement("div");
col.classList.add("bar");

let segments=[];
for(let j=0;j<10;j++){
let s=document.createElement("div");
s.classList.add("seg");
col.appendChild(s);
segments.push(s);
}

vu.appendChild(col);
bars.push(segments);
}

/* INIT */
function initVU(){
ctx=new (window.AudioContext||window.webkitAudioContext)();
analyser=ctx.createAnalyser();
analyser.fftSize=256;

source=ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);

dataArray=new Uint8Array(analyser.frequencyBinCount);
}

/* ANIMAÇÃO */
function animateVU(){
requestAnimationFrame(animateVU);
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

let nivel=audio.volume;

for(let i=0;i<bars.length;i++){
let v=dataArray[i]||0;
let intensidade=(v/255)*bars[i].length*(nivel+0.2);

bars[i].forEach((seg,index)=>{
if(index<intensidade){
if(index<4) seg.style.background="#00ff00";
else if(index<7) seg.style.background="#ffff00";
else seg.style.background="#ff0000";
}else{
seg.style.background="#222";
}
});
}
}

/* RELÓGIO */
setInterval(()=>{
time.innerText=new Date().toLocaleTimeString();
date.innerText=new Date().toLocaleDateString();
},1000);

/* LED STROBO */
setInterval(()=>{
if(!ligado){
led1.style.background="#444";
return;
}
led1.style.background=Math.random()>0.5?"red":"#300";
},250);

/* MÚSICA */
setInterval(()=>{
if(!ligado) return;
musica.innerText="🟢 Música "+Math.floor(Math.random()*100);
},4000);

/* OUVINTES */
setInterval(()=>{
if(!ligado) return;
ouvintes.innerText="🟡 "+Math.floor(Math.random()*300)+" ouvintes";
},3000);

</script>

</body>
</html>
