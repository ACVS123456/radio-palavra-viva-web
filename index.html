<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Palavra Viva - WEB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI';
    background:#0d1117;
    color:white;
    padding-bottom:90px;
}

/* HEADER */
header{
    background:#161b22;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    flex-wrap:wrap;
}

header h1{color:#1db954;font-size:16px;}

.status-top{display:flex;align-items:center;gap:10px;}

#led{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#444;
}

/* RELÓGIO */
.clock{
    text-align:center;
    font-size:12px;
    line-height:14px;
    margin-left:10px;
}

/* PAGES */
.page{display:none;padding:15px;}
.active{display:block;}

/* BANNER */
.banner{
    background:linear-gradient(135deg,#1db954,#000);
    padding:25px;
    border-radius:10px;
    text-align:center;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    margin-top:10px;
}

.card{
    background:#161b22;
    padding:10px;
    border-radius:10px;
    font-size:14px;
}

/* BOTÕES MENU */
.menu{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px 0;
}

button{
    background:#1db954;
    border:none;
    padding:8px 10px;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#161b22;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
}

/* VOLUME */
.player input[type="range"]{
    width:120px;
}

/* INPUTS */
input{
    padding:8px;
    border-radius:5px;
    border:none;
    width:100%;
    margin:5px 0;
}

/* VU */
.vu{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:2px;
    margin-top:20px;
    height:120px;
}

.bar{
    width:5px;
    height:10px;
    background:#00ff2a;
    border-radius:3px;
}

/* AVISOS */
.aviso{
    margin-top:10px;
    font-size:12px;
    opacity:0.8;
}

</style>
</head>

<body>

<header>
<h1>🌐Rádio Palavra Viva WEB</h1>

<div class="status-top">
<div id="led"></div>

<!-- 🔥 RELÓGIO RESTAURADO -->
<div class="clock">
<div id="time">00:00:00</div>
<div id="date">--/--/----</div>
</div>

</div>
</header>

<!-- MENU -->
<div class="menu">
<button onclick="show('home')">🏠 Home</button>
<button onclick="show('pedido')">🎵 Pedido</button>
<button onclick="openAdmin()">🔒 Admin</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="banner">
<h2 id="statusTopo">⚫ OFFLINE</h2>
<p id="musica">⚫️ OFFLINE</p>
<p id="ouvintes">0 ouvintes</p>

<!-- VU -->
<div class="vu" id="vu"></div>

<!-- 🔥 AVISOS RESTAURADOS -->
<div class="aviso">
▶️ Clique em play para iniciar o áudio<br>
🔄 Se parar, recarregue a página<br>
📶 Aguarde conexão com stream
</div>

</div>

<div class="grid">
<div class="card">🕒 24h no ar</div>
<div class="card">🎤 Ao vivo</div>
<div class="card">🔥 Hits atualizados</div>
</div>
</div>

<!-- PEDIDO -->
<div id="pedido" class="page">
<h3>🎵 Pedir Música</h3>
<input id="nome" placeholder="Seu nome">
<input id="musicaInput" placeholder="Música">
<input id="cantor" placeholder="Cantor">
<button onclick="enviar()">Enviar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h3>📋 Admin</h3>
<div id="lista"></div>
</div>

<!-- PLAYER -->
<div class="player">
<button onclick="play()" id="btn"><i class="fas fa-play"></i></button>

<input type="range" min="0" max="1" step="0.01" id="volume">

<span id="statusPlayer">Parado</span>
</div>

<audio id="audio" src="https://heights-blue-hub-remember.trycloudflare.com/stream"></audio>

<script>

/* ELEMENTOS */
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const led = document.getElementById("led");

/* MENU */
function show(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* RELÓGIO RESTAURADO */
function clock(){
const now = new Date();

document.getElementById("time").innerText =
now.toLocaleTimeString();

document.getElementById("date").innerText =
now.toLocaleDateString();
}
setInterval(clock,1000);
clock();

/* AUDIO + VU */
let ctx, analyser, source, dataArray;
let started = false;

const vu = document.getElementById("vu");
const bars = [];

for(let i=0;i<50;i++){
let b=document.createElement("div");
b.className="bar";
vu.appendChild(b);
bars.push(b);
}

function initAudio(){

if(started) return;

ctx = new (window.AudioContext || window.webkitAudioContext)();

analyser = ctx.createAnalyser();
analyser.fftSize = 512;
analyser.smoothingTimeConstant = 0.7;

source = ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);

dataArray = new Uint8Array(analyser.frequencyBinCount);

started = true;
}

/* PLAY */
function play(){

if(audio.paused){

audio.play();

btn.innerHTML='<i class="fas fa-pause"></i>';

document.getElementById("statusPlayer").innerText="AO VIVO 🔴";
document.getElementById("statusTopo").innerText="🔴 AO VIVO";

led.style.background="#00ff2a";

initAudio();

if(!window.vuRun){
window.vuRun=true;
animateVU();
}

}else{

audio.pause();

btn.innerHTML='<i class="fas fa-play"></i>';

document.getElementById("statusPlayer").innerText="Parado";
document.getElementById("statusTopo").innerText="⚫ OFFLINE";

led.style.background="#444";
}
}

/* VU */
function animateVU(){
requestAnimationFrame(animateVU);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

for(let i=0;i<bars.length;i++){

let v=dataArray[i]||0;
let h=(v/255)*120;

bars[i].style.height=h+"px";

bars[i].style.background=
h<40?"#00ff2a":
h<80?"#ffff00":"#ff0000";
}
}

/* VOLUME */
document.getElementById("volume").oninput=(e)=>{
audio.volume=e.target.value;
};

/* PEDIDOS */
function enviar(){
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];

pedidos.push({
nome:nome.value,
musica:musicaInput.value,
cantor:cantor.value,
data:new Date().toLocaleString()
});

localStorage.setItem("pedidos",JSON.stringify(pedidos));

alert("Pedido enviado!");
}

/* ADMIN */
function openAdmin(){
let senha=prompt("Senha:");
if(senha!=="928374") return;

show("admin");

let lista=document.getElementById("lista");
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[];

lista.innerHTML="";

pedidos.forEach((p,i)=>{
lista.innerHTML+=`
<div>
<b>${p.nome}</b><br>
${p.musica} - ${p.cantor}<br>
${p.data}<hr>
</div>`;
});
}

/* SIMULAÇÕES */
setInterval(()=>{
document.getElementById("ouvintes").innerText=
"🟡 Ouvintes: "+Math.floor(Math.random()*200);
},3000);

setInterval(()=>{
document.getElementById("musica").innerText=
"🟢 Tocando: Música "+Math.floor(Math.random()*100);
},5000);

</script>

</body>
</html>
